<div [formGroup]="uploadForm" class="grid gap-3 rounded-md border border-dashed border-[#B8B2A3] bg-white p-4 shadow-[inset_0_0_0_1px_rgba(0,167,181,0.05)]">
  <div>
    <p class="font-display text-sm font-semibold text-[#141817]">{{ label || defaultLabel }}</p>
    <p class="mt-1 text-sm leading-5 text-neutral-500">{{ hint || defaultHint }}</p>
  </div>

  <label class="flex min-h-12 cursor-pointer items-center justify-between gap-3 rounded-md border border-[#B8B2A3] bg-[#ECEAE1] px-3 py-2 transition-colors hover:border-[#00A7B5] hover:bg-[#00A7B5]/5 focus-within:outline focus-within:outline-2 focus-within:outline-offset-2 focus-within:outline-[#00A7B5]">
    <input
      type="file"
      class="sr-only"
      [attr.accept]="acceptedFileTypes"
      (change)="onFileSelected($event)"
    />
    <span class="min-w-0 truncate font-mono text-xs text-neutral-700">
      {{ selectedFileName() || 'No file selected' }}
    </span>
    <span class="shrink-0 rounded-md border border-[#00A7B5]/30 bg-white px-2 py-1 font-display text-xs font-semibold uppercase text-[#006F78]">Browse</span>
  </label>

  <div class="flex items-center justify-between gap-3">
    <button type="button" class="inline-flex min-h-10 items-center justify-center rounded-md border border-[#B8B2A3] bg-[#FAFAF7] px-4 py-2 font-display text-sm font-semibold text-[#141817] transition-colors hover:border-[#00A7B5] hover:bg-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#00A7B5] disabled:cursor-not-allowed disabled:opacity-50" (click)="onUpload()">
      {{ buttonLabel }}
    </button>
  </div>

  @if (uploadMessage()) {
    <p
      class="text-sm leading-5"
      [ngClass]="uploadMessageTone() === 'error' ? 'font-medium text-[#C2410C]' : uploadMessageTone() === 'success' ? 'font-medium text-emerald-700' : 'text-neutral-600'"
    >
      {{ uploadMessage() }}
    </p>
  }
</div>
