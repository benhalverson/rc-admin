<main class="admin-shell">
  <section class="admin-rail max-w-xl">
    <header class="page-header print-bed-grid">
      <div class="page-header__content">
        <div>
          <p class="eyebrow">Operator access</p>
          <h1 class="page-title">Sign in</h1>
          <p class="page-copy">
            Access catalog setup, upload confirmation, and order operations.
          </p>
        </div>
      </div>
    </header>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="admin-panel"
    >
      <div class="admin-panel__body grid gap-5">
        <div class="form-field">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            data-cy="email-input"
            required
            class="form-control"
          />
          @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
            <div class="form-error">
              <small>Email is required.</small>
            </div>
          }
        </div>

        <div class="form-field">
          <label for="password" class="form-label">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            data-cy="password-input"
            required
            class="form-control"
          />
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <div class="form-error">
              <small>Password is required</small>
            </div>
          }
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid"
          data-cy="login-button"
          class="btn btn-primary w-full"
        >
          Sign in
        </button>
      </div>
    </form>
  </section>
</main>
