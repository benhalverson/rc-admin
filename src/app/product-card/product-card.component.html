<div
  class="product-card overflow-hidden bg-white transition-shadow duration-300 hover:shadow-lg"
  data-cy="product-card"
>
  <div class="relative h-48 w-full bg-workbench">
    <img
      [src]="product().image"
      [alt]="product().name"
      class="h-full w-full object-cover object-center"
    />
    <div class="absolute right-2 top-2 border border-rail bg-panel px-2 py-1 shadow-sm">
      <span class="font-mono text-xs font-semibold text-ink" data-cy="product-card-price">{{ product().price | currency }}</span>
    </div>
  </div>

  <div class="grid gap-3 p-4">
    <h3
      class="font-display text-lg font-semibold text-ink line-clamp-1"
      data-cy="product-card-name"
    >
      {{ product().name }}
    </h3>

    <p
      class="min-h-10 text-sm leading-5 text-slate-600 line-clamp-2"
      data-cy="product-card-description"
    >
      {{ product().description }}
    </p>

    <div
      class="status-pill w-fit"
      [ngClass]="readiness()?.checkoutReady ? 'status-pill--ready' : 'status-pill--warning'"
      [title]="readinessReasons()"
    >
      {{ readinessLabel() }}
    </div>

    <div class="flex items-center justify-between gap-3">
      <span class="status-pill status-pill--info" data-cy="product-card-filament">
        {{ product().filamentType }}
      </span>
      <div class="flex min-w-0 items-center">
        <div
          class="mr-2 h-4 w-4 shrink-0 rounded-full border border-slate-300"
          [style.background-color]="product().color"
          [title]="product().color"
          data-cy="product-card-color-preview"
        ></div>
        <span class="min-w-0 truncate font-mono text-xs text-slate-500" data-cy="product-card-color-value">{{ product().color }}</span>
      </div>
    </div>

    <div class="grid grid-cols-[1fr_auto] gap-2 pt-1">
      <a
        [routerLink]="['/product', product().id]"
        class="btn btn-primary"
        data-cy="product-card-details-link"
      >
        View Details
      </a>
      <button type="button" class="btn btn-destructive px-3" (click)="delete()" data-cy="product-card-delete-button">Delete</button>
    </div>
  </div>
</div>
