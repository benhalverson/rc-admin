<div
  class="relative overflow-hidden rounded-md border border-[#B8B2A3] bg-[#FAFAF7] shadow-[0_1px_0_rgba(20,24,23,0.05),0_14px_32px_rgba(20,24,23,0.08)] transition-[border-color,transform,box-shadow] duration-200 hover:-translate-y-0.5 hover:border-[#00A7B5] hover:shadow-[0_1px_0_rgba(20,24,23,0.05),0_18px_36px_rgba(20,24,23,0.12)]"
  data-cy="product-card"
>
  <div
    class="absolute left-0 top-0 z-20 h-full w-1"
    [ngClass]="readiness()?.checkoutReady ? 'bg-[#00A7B5]' : 'bg-[#C2410C]'"
  ></div>

  <div class="relative h-44 w-full bg-[#ECEAE1]">
    <img
      [src]="product().image"
      [alt]="product().name"
      class="h-full w-full object-cover object-center"
    />
    <div class="absolute right-2 top-2 rounded-md border border-[#B8B2A3] bg-[#FAFAF7] px-2 py-1 shadow-sm">
      <span class="font-mono text-xs font-semibold text-[#141817]" data-cy="product-card-price">{{ product().price | currency }}</span>
    </div>
  </div>

  <div class="grid gap-3 p-4 pl-5">
    <h3
      class="line-clamp-1 font-display text-base font-semibold text-[#141817]"
      data-cy="product-card-name"
    >
      {{ product().name }}
    </h3>

    <p
      class="line-clamp-2 min-h-10 text-sm leading-5 text-neutral-600"
      data-cy="product-card-description"
    >
      {{ product().description }}
    </p>

    <div
      class="inline-flex w-fit items-center rounded-full border px-2.5 py-1 font-mono text-[11px] font-semibold uppercase"
      [ngClass]="readiness()?.checkoutReady ? 'border-emerald-200 bg-emerald-50 text-emerald-800' : 'border-amber-200 bg-amber-50 text-amber-800'"
      [title]="readinessReasons()"
    >
      {{ readinessLabel() }}
    </div>

    <div class="flex items-center justify-between gap-3">
      <span class="inline-flex items-center rounded-full border border-[#00A7B5]/30 bg-[#00A7B5]/10 px-2.5 py-1 font-mono text-[11px] font-semibold uppercase text-[#006F78]" data-cy="product-card-filament">
        {{ product().filamentType }}
      </span>
      <div class="flex min-w-0 items-center">
        <div
          class="mr-2 h-4 w-4 shrink-0 rounded-full border border-neutral-300"
          [style.background-color]="product().color"
          [title]="product().color"
          data-cy="product-card-color-preview"
        ></div>
        <span class="min-w-0 truncate font-mono text-xs text-neutral-500" data-cy="product-card-color-value">{{ product().color }}</span>
      </div>
    </div>

    <div class="grid grid-cols-[1fr_auto] gap-2 pt-1">
      <a
        [routerLink]="['/product', product().id]"
        class="inline-flex min-h-10 items-center justify-center rounded-md border border-[#141817] bg-[#141817] px-4 py-2 font-display text-sm font-semibold text-white transition-colors hover:bg-black focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#00A7B5]"
        data-cy="product-card-details-link"
      >
        View Details
      </a>
      <button type="button" class="inline-flex min-h-10 items-center justify-center rounded-md border border-[#C2410C] bg-[#C2410C] px-3 py-2 font-display text-sm font-semibold text-white transition-colors hover:bg-red-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#00A7B5]" (click)="delete()" data-cy="product-card-delete-button">Delete</button>
    </div>
  </div>
</div>
